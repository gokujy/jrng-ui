<article
  [class]="cardClasses()"
  data-jc-name="card"
  data-jc-section="root"
  data-jc-extend="header body footer actions"
  [attr.data-j-active]="interactive() ? 'true' : null"
  [attr.data-j-loading]="skeleton() ? 'true' : null"
  [attr.role]="interactive() ? 'button' : null"
  [attr.tabindex]="interactive() ? '0' : null"
>
  @if (skeleton()) {
    <div class="j-card__skeleton" data-jc-section="skeleton" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
  } @else {
    @if (header() || subheader()) {
      <header class="j-card__header" data-jc-section="header">
        @if (header()) {
          <h3 class="j-card__title" data-jc-section="title">{{ header() }}</h3>
        }
        @if (subheader()) {
          <p class="j-card__subtitle" data-jc-section="subtitle">{{ subheader() }}</p>
        }
      </header>
    }

    <ng-content select="[jCardHeader]"></ng-content>

    <section class="j-card__body" data-jc-section="body">
      <ng-content></ng-content>
      <ng-content select="[jCardBody]"></ng-content>
    </section>

    <footer class="j-card__footer" data-jc-section="footer">
      @if (footer()) {
        <span>{{ footer() }}</span>
      }
      <ng-content select="[jCardFooter]"></ng-content>
      <div class="j-card__actions" data-jc-section="actions">
        <ng-content select="[jCardActions]"></ng-content>
      </div>
    </footer>
  }
</article>

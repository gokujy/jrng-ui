<article
  [class]="cardClasses"
  [attr.role]="clickable ? 'button' : null"
  [attr.tabindex]="clickable ? '0' : null"
>
  @if (resolvedHeader || resolvedSubheader) {
    <header class="j-card__header">
      @if (resolvedHeader) {
        <h3 class="j-card__title">{{ resolvedHeader }}</h3>
      }
      @if (resolvedSubheader) {
        <p class="j-card__subtitle">{{ resolvedSubheader }}</p>
      }
    </header>
  }

  <ng-content select="[jCardHeader]"></ng-content>

  <section class="j-card__body">
    <ng-content></ng-content>
    <ng-content select="[jCardBody]"></ng-content>
  </section>

  <footer class="j-card__footer">
    <ng-content select="[jCardFooter]"></ng-content>
  </footer>
</article>

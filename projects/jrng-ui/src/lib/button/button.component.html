<button
  [class]="buttonClasses"
  [type]="type"
  [disabled]="isBlocked"
  [attr.aria-disabled]="isBlocked"
  [attr.aria-busy]="loading"
  [attr.aria-label]="ariaLabel || null"
  (click)="handleClick($event)"
>
  @if (loading) {
    <span class="j-button__spinner" aria-hidden="true"></span>
  }
  @if (icon && iconPosition === 'left') {
    <span class="j-button__icon" aria-hidden="true">{{ icon }}</span>
  }
  <span class="j-button__icon" aria-hidden="true"
    ><ng-content select="[jButtonPrefix]"></ng-content
  ></span>
  <span class="j-button__label">
    @if (label) {
      {{ label }}
    } @else {
      <ng-content></ng-content>
    }
  </span>
  <span class="j-button__icon" aria-hidden="true"
    ><ng-content select="[jButtonSuffix]"></ng-content
  ></span>
  @if (icon && iconPosition === 'right') {
    <span class="j-button__icon" aria-hidden="true">{{ icon }}</span>
  }
</button>

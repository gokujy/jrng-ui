<button
  [class]="buttonClasses()"
  data-jc-name="button"
  data-jc-section="root"
  data-jc-extend="prefix suffix"
  [attr.data-j-disabled]="isBlocked() ? 'true' : null"
  [attr.data-j-loading]="loading() ? 'true' : null"
  [type]="type()"
  [disabled]="isBlocked()"
  [attr.aria-disabled]="isBlocked()"
  [attr.aria-busy]="loading()"
  [attr.aria-label]="ariaLabel() || null"
  (click)="handleClick($event)"
>
  @if (loading()) {
    <span class="j-button__spinner" data-jc-section="loader" aria-hidden="true"></span>
  }
  @if (icon() && iconPosition() === 'left') {
    <span class="j-button__icon" data-jc-section="icon" aria-hidden="true">{{ icon() }}</span>
  }
  <span class="j-button__icon" data-jc-section="prefix" aria-hidden="true"
    ><ng-content select="[jButtonPrefix]"></ng-content
  ></span>
  <span class="j-button__label" data-jc-section="label">
    @if (label()) {
      {{ label() }}
    } @else {
      <ng-content></ng-content>
    }
  </span>
  <span class="j-button__icon" data-jc-section="suffix" aria-hidden="true"
    ><ng-content select="[jButtonSuffix]"></ng-content
  ></span>
  @if (icon() && iconPosition() === 'right') {
    <span class="j-button__icon" data-jc-section="icon" aria-hidden="true">{{ icon() }}</span>
  }
</button>

<button
  class="jr-button"
  [class]="'jr-button jr-button--' + variant + ' jr-button--' + size"
  [class.jr-button--full]="fullWidth"
  [class.jr-button--loading]="loading"
  [type]="type"
  [disabled]="isBlocked"
  [attr.aria-disabled]="isBlocked"
  [attr.aria-busy]="loading"
  [attr.aria-label]="ariaLabel || null"
  (click)="handleClick($event)"
>
  <span class="jr-button__spinner" aria-hidden="true" *ngIf="loading"></span>
  <span class="jr-button__icon" aria-hidden="true" *ngIf="iconBefore">{{ iconBefore }}</span>
  <span class="jr-button__icon" aria-hidden="true"
    ><ng-content select="[jrButtonPrefix]"></ng-content
  ></span>
  <span class="jr-button__label"><ng-content></ng-content></span>
  <span class="jr-button__icon" aria-hidden="true"
    ><ng-content select="[jrButtonSuffix]"></ng-content
  ></span>
  <span class="jr-button__icon" aria-hidden="true" *ngIf="iconAfter">{{ iconAfter }}</span>
</button>

<article
  class="jr-card"
  [class]="'jr-card jr-card--' + variant"
  [class.jr-card--clickable]="clickable"
  [attr.role]="clickable ? 'button' : null"
  [attr.tabindex]="clickable ? '0' : null"
>
  <header class="jr-card__header" *ngIf="title || subtitle">
    <h3 class="jr-card__title" *ngIf="title">{{ title }}</h3>
    <p class="jr-card__subtitle" *ngIf="subtitle">{{ subtitle }}</p>
  </header>

  <ng-content select="[jrCardHeader]"></ng-content>

  <section class="jr-card__body">
    <ng-content></ng-content>
    <ng-content select="[jrCardBody]"></ng-content>
  </section>

  <footer class="jr-card__footer">
    <ng-content select="[jrCardFooter]"></ng-content>
  </footer>
</article>

<j-toast />
<j-confirm-dialog />

<div class="showcase-shell">
  <aside class="showcase-sidebar">
    <a class="showcase-brand" routerLink="/introduction" aria-label="JRNG UI showcase home">
      <span class="showcase-brand__mark">J</span>
      <span>
        <strong>JRNG UI</strong>
        <small>Showcase</small>
      </span>
    </a>

    <nav class="showcase-nav" aria-label="Showcase pages">
      <a
        *ngFor="let item of primaryNav"
        [routerLink]="item.path"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </a>
    </nav>
  </aside>

  <main class="showcase-main">
    <router-outlet />
  </main>
</div>

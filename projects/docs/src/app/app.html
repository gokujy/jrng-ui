<div class="docs-shell">
  <header class="docs-header">
    <div class="docs-container docs-header__inner">
      <a class="docs-brand" routerLink="/">
        <span class="docs-brand__mark">J</span>
        JRNG UI
      </a>

      <nav class="docs-nav" aria-label="Primary">
        @for (item of nav; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          >
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="docs-header__actions">
        <button class="docs-icon-button" type="button" (click)="toggleDensity()">
          {{ density() === 'compact' ? 'Comfortable' : 'Compact' }}
        </button>
        <button
          class="docs-icon-button"
          type="button"
          (click)="cycleMode()"
          [attr.aria-label]="'Theme mode: ' + modeLabel()"
        >
          {{ modeLabel() }}
        </button>
        <a class="docs-icon-button" [href]="githubUrl" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </div>
  </header>

  <main class="docs-main">
    <router-outlet />
  </main>

  <footer class="docs-footer">
    <div class="docs-container docs-footer__inner">
      <span>JRNG UI — a standalone Angular component library. MIT licensed.</span>
      <a [href]="githubUrl" target="_blank" rel="noreferrer">github.com/gokujy/jrng-ui</a>
    </div>
  </footer>

  <j-toast />
  <j-confirm-dialog />
</div>

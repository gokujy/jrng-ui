name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22.12.0

jobs:
  quality:
    name: Quality and registries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build:lib
      - run: npm run generate:enterprise-audits
      - run: npm run verify:enterprise-audits
      - run: npm run verify:circular
      - run: npm run verify:optional-dependencies
      - run: npm run lint
      - run: npm run verify:api
      - run: npm run verify:registry
      - run: npm run verify:docs-registry
      - run: npm run verify:docs-links
      - run: npm run verify:spec-coverage
      - run: npm run verify:doc-examples
      - run: npm run docs:audit

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run test:docs
      - run: npm run test:compatibility

  builds:
    name: Production builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build:lib
      - run: npm run build:docs:app
      - run: npm run typecheck:library

  package:
    name: Package and clean consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run verify:package
      - run: npm run verify:consumer
      - run: npm run verify:visual-manifest

  ssr:
    name: SSR and hydration build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run verify:ssr

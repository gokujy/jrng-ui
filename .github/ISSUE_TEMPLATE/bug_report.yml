name: Bug report
description: Report reproducible JRNG UI behavior that differs from the documented API.
title: '[Bug]: '
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve JRNG UI. Remove private data from reproductions and screenshots.
  - type: input
    id: jrng-version
    attributes:
      label: JRNG UI version
      placeholder: 0.0.8
    validations:
      required: true
  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: 21.2.x
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and operating system
      placeholder: Chrome 140 on Windows 11
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that consistently reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link to a public repository or valid online example.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Add visual evidence when it helps explain the issue.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and documentation first.
          required: true
        - label: The reproduction contains no private or sensitive information.
          required: true

name: Feature request
description: Propose a reusable improvement to JRNG UI.
title: '[Feature]: '
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem being solved
      description: Describe the user or developer problem without prescribing implementation first.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Example use case
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: Suggested API
      render: typescript
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This can be implemented as a generic Angular component-library feature.
          required: true
